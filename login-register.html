<body class="bg-background text-on-surface min-h-screen flex items-center justify-center p-gutter relative overflow-hidden">

<!-- Floating Code Snippets for IT School Aesthetic -->
<div class="floating-code top-10 left-10 text-primary-container font-code-snippet text-code-snippet">const kredo = () =&gt; { connect: true };</div>
<div class="floating-code top-1/4 right-20 text-on-surface-variant font-code-snippet text-code-snippet">import { Community } from '@kredo/core';</div>
<div class="floating-code bottom-1/4 left-32 text-secondary font-code-snippet text-code-snippet">&lt;div class="bayanihan-grid"&gt;</div>
<div class="floating-code bottom-20 right-1/3 text-primary font-code-snippet text-code-snippet">git commit -m "joined community"</div>
</div>
<!-- Main Container -->
<main class="w-full max-w-[440px] z-10">
<!-- Logo & Brand Section -->
<header class="flex flex-col items-center mb-xl">
<div class="w-16 h-16 bg-primary rounded-xl flex items-center justify-center shadow-lg mb-md transform transition-transform hover:scale-105">
<span class="material-symbols-outlined text-on-primary text-[40px]">hub</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary tracking-tight">Kredo Plus</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mt-xs">Welcome Kredo Students!</p>
</header>
<!-- Form Card -->
<section class="glass-effect rounded-xl shadow-xl p-lg transition-all duration-500" id="auth-card">
<!-- Tab Switcher (Simulated) -->
<div class="flex bg-surface-container-low rounded-lg p-1 mb-lg">
<button class="flex-1 py-2 rounded-md font-label-caps text-label-caps bg-surface-container-lowest text-primary shadow-sm transition-all" id="login-tab">Sign In</button>
<button class="flex-1 py-2 rounded-md font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-all" id="signup-tab">Sign Up</button>
</div>
<form class="space-y-md" id="login-form">
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-body-sm text-body-sm font-bold text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all font-body-sm text-body-sm" id="email" name="email" placeholder="student@kredo.edu" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center px-1">
<label class="font-body-sm text-body-sm font-bold text-on-surface-variant" for="password">Password</label>
<a class="font-body-sm text-body-sm text-primary hover:underline transition-all" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all font-body-sm text-body-sm" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full py-3 bg-primary text-on-primary rounded-lg font-headline-md text-headline-md shadow-md hover:bg-opacity-90 active:scale-95 transition-all flex items-center justify-center gap-sm mt-lg" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Switch Footer -->
<div class="mt-lg text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant" id="auth-footer-text">
                    Don't have an account? 
                    <button class="text-primary font-bold hover:underline" id="toggle-auth">Sign Up</button>

<p class="font-label-caps text-label-caps text-outline-variant mt-lg">© 2024 Kredo Connect. Empowering the Next Gen of Developers.</p>

</main>
<script>
        const authCard = document.getElementById('auth-card');
        const loginTab = document.getElementById('login-tab');
        const signupTab = document.getElementById('signup-tab');
        const submitBtn = document.querySelector('button[type="submit"] span');
        const footerToggle = document.getElementById('toggle-auth');
        const footerPara = document.getElementById('auth-footer-text');

        let isLogin = true;

        function toggleState() {
            isLogin = !isLogin;
            
            authCard.style.opacity = '0';
            authCard.style.transform = 'translateY(10px)';

            setTimeout(() => {
                if (isLogin) {
                    loginTab.classList.add('bg-surface-container-lowest', 'text-primary', 'shadow-sm');
                    signupTab.classList.remove('bg-surface-container-lowest', 'text-primary', 'shadow-sm');
                    signupTab.classList.add('text-on-surface-variant');
                    submitBtn.textContent = 'Sign In';
                    footerPara.innerHTML = 'Don\'t have an account? <button id="toggle-auth" class="text-primary font-bold hover:underline">Sign Up</button>';
                } else {
                    signupTab.classList.add('bg-surface-container-lowest', 'text-primary', 'shadow-sm');
                    loginTab.classList.remove('bg-surface-container-lowest', 'text-primary', 'shadow-sm');
                    loginTab.classList.add('text-on-surface-variant');
                    submitBtn.textContent = 'Create Account';
                    footerPara.innerHTML = 'Already have an account? <button id="toggle-auth" class="text-primary font-bold hover:underline">Sign In</button>';
                }
                
                document.getElementById('toggle-auth').addEventListener('click', toggleState);
                
                authCard.style.opacity = '1';
                authCard.style.transform = 'translateY(0)';
            }, 300);
        }

        loginTab.addEventListener('click', () => { if (!isLogin) toggleState(); });
        signupTab.addEventListener('click', () => { if (isLogin) toggleState(); });
        footerToggle.addEventListener('click', toggleState);

        window.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            document.querySelectorAll('.floating-code').forEach((el, index) => {
                const speed = (index + 1) * 20;
                el.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
            });
        });
    </script>
</body></html>
