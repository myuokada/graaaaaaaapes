<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kredo Community - New Post</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface": "#fcf9f8",
                    "surface-dim": "#dcd9d9",
                    "surface-bright": "#fcf9f8",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-low": "#f6f3f2",
                    "surface-container": "#f1eeed",
                    "surface-container-high": "#ebe8e7",
                    "surface-container-highest": "#e5e2e1",
                    "on-surface": "#1c1b1b",
                    "on-surface-variant": "#49454f",
                    "outline": "#7a757f",
                    "outline-variant": "#cbc4cf",
                    "primary": "#4285f4",
                    "on-primary": "#ffffff",
                    "primary-container": "#d7e3ff",
                    "on-primary-container": "#001b3f",
                    "secondary": "#5e5e5e",
                    "on-secondary": "#ffffff",
                    "secondary-container": "#e4e2e2",
                    "on-secondary-container": "#1b1c1c",
                    "tertiary": "#ea4335",
                    "on-tertiary": "#ffffff",
                    "tertiary-container": "#ffdad6",
                    "on-tertiary-container": "#410002",
                    "error": "#ba1a1a",
                    "on-error": "#ffffff",
                    "error-container": "#ffdad6",
                    "on-error-container": "#410002",
                    "background": "#fcf9f8",
                    "on-background": "#1c1b1b"
            },
            "borderRadius": {
                    "DEFAULT": "8px",
                    "lg": "12px",
                    "xl": "16px",
                    "full": "9999px"
            },
            "spacing": {
                    "base": "4px",
                    "lg": "24px",
                    "gutter": "16px",
                    "margin-desktop": "32px",
                    "xl": "48px",
                    "sm": "8px",
                    "max-width": "1280px",
                    "md": "16px",
                    "margin-mobile": "16px",
                    "xs": "4px"
            },
            "fontFamily": {
                    "body-sm": ["Hanken Grotesk"],
                    "label-caps": ["Hanken Grotesk"],
                    "body-lg": ["Hanken Grotesk"],
                    "headline-md": ["Hanken Grotesk"],
                    "code-snippet": ["monospace"],
                    "headline-lg": ["Hanken Grotesk"],
                    "headline-lg-mobile": ["Hanken Grotesk"]
            },
            "fontSize": {
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "code-snippet": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .modal-blur {
            backdrop-filter: blur(8px);
            background-color: rgba(28, 27, 27, 0.4);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbc4cf;
            border-radius: 10px;
        }
        body {
            min-height: max(884px, 100dvh);
            font-family: 'Hanken Grotesk', sans-serif;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-lg min-h-screen">
<!-- Background Content (Simulated Home Screen) -->
<div class="fixed inset-0 overflow-hidden pointer-events-none opacity-40">
<!-- TopAppBar Placeholder -->
<header class="bg-surface shadow-sm h-16 w-full flex items-center justify-between px-margin-mobile">
<span class="font-headline-md text-headline-md font-bold text-primary">Kredo Connect</span>
<div class="w-10 h-10 rounded-full bg-surface-container"></div>
</header>
<!-- Home Content Bento Grid -->
<main class="p-lg grid grid-cols-1 md:grid-cols-3 gap-lg max-w-max-width mx-auto">
<div class="md:col-span-2 h-64 bg-surface-container rounded-xl shadow-sm"></div>
<div class="h-64 bg-surface-container rounded-xl shadow-sm"></div>
<div class="h-48 bg-surface-container rounded-xl shadow-sm"></div>
<div class="h-48 bg-surface-container rounded-xl shadow-sm"></div>
<div class="h-48 bg-surface-container rounded-xl shadow-sm"></div>
</main>
</div>
<!-- New Post Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-end md:items-center justify-center p-0 md:p-lg modal-blur transition-opacity duration-300" id="modalOverlay">
<!-- Modal Container -->
<div class="bg-surface-container-lowest w-full max-w-2xl max-h-[795px] rounded-t-3xl md:rounded-3xl shadow-2xl overflow-hidden flex flex-col transform transition-transform duration-300 translate-y-0 relative">
<!-- Modal Header -->
<div class="px-lg py-md flex items-center justify-between border-b border-outline-variant/30 sticky top-0 bg-surface-container-lowest z-10">
<h1 class="font-headline-md text-headline-md text-on-surface">Share Information</h1>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors text-on-surface-variant active:scale-90" id="closeModal">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Scrollable Content Area -->
<form class="p-lg flex-1 overflow-y-auto custom-scrollbar space-y-lg" id="postForm">
<!-- Category Selection -->
<div class="space-y-sm">
<label class="font-body-sm text-body-sm font-bold text-on-surface-variant">Select Category</label>
<div class="flex flex-wrap gap-sm">
<button class="px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant font-label-caps text-label-caps hover:bg-primary-container hover:text-on-primary-container transition-all active:scale-95" onclick="toggleChip(this)" type="button">
                        JavaScript
                    </button>
<button class="px-4 py-2 rounded-full bg-primary text-on-primary font-label-caps text-label-caps border border-primary active:scale-95" onclick="toggleChip(this)" type="button">
                        Web Design
                    </button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant font-label-caps text-label-caps hover:bg-primary-container hover:text-on-primary-container transition-all active:scale-95" onclick="toggleChip(this)" type="button">
                        React.js
                    </button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant font-label-caps text-label-caps hover:bg-primary-container hover:text-on-primary-container transition-all active:scale-95" onclick="toggleChip(this)" type="button">
                        Mentorship
                    </button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant font-label-caps text-label-caps hover:bg-primary-container hover:text-on-primary-container transition-all active:scale-95" onclick="toggleChip(this)" type="button">
                        Career Tips
                    </button>
</div>
</div>
<!-- Information Title -->
<div class="space-y-sm">
<label class="font-body-sm text-body-sm font-bold text-on-surface-variant" for="title">Title of Information</label>
<input class="w-full h-12 px-md bg-surface-bright border border-outline-variant rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow text-on-surface" id="title" placeholder="e.g., Guide to Mastering Flexbox in 2024" type="text"/>
</div>
<!-- Detailed Description -->
<div class="space-y-sm">
<label class="font-body-sm text-body-sm font-bold text-on-surface-variant" for="description">Detailed Description</label>
<textarea class="w-full p-md bg-surface-bright border border-outline-variant rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow text-on-surface resize-none" id="description" placeholder="Describe the information you are sharing in detail..." rows="4"></textarea>
</div>
<!-- Pricing/Rate & Image Upload Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<!-- Numeric Input for Price -->
<div class="space-y-sm">
<label class="font-body-sm text-body-sm font-bold text-on-surface-variant" for="price">Price or Rate (USD)</label>
<div class="relative">
<span class="absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant font-bold">$</span>
<input class="w-full h-12 pl-8 pr-md bg-surface-bright border border-outline-variant rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow text-on-surface" id="price" placeholder="0.00" type="number"/>
</div>
<p class="text-xs text-outline italic">Set to 0 if this is free content.</p>
</div>
<!-- Image Upload Placeholder -->
<div class="space-y-sm">
<label class="font-body-sm text-body-sm font-bold text-on-surface-variant">Featured Image</label>
<div class="relative h-32 w-full rounded-lg border-2 border-dashed border-outline-variant bg-surface-container-low hover:bg-surface-container transition-colors cursor-pointer group overflow-hidden">
<input class="absolute inset-0 opacity-0 cursor-pointer z-10" type="file"/>
<div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined text-3xl mb-xs" data-icon="add_photo_alternate">add_photo_alternate</span>
<span class="font-label-caps text-label-caps">Upload Cover Photo</span>
</div>
<div class="absolute inset-0 opacity-10 bg-cover bg-center" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAneAeriWQKNuzmsRYCGlJaqtNsr5mJ4_COyM-em20s1q-OnwrrdgB3GObhb-sCPLbnQORJ6STD7JRKQMAiup9e1bXeesleRjlGrDu1Fz9PwHFgOwqXW1ziTef2azrlPmRJk6ppKS-s8d73mowE40AlN5fAk815ylk0MBS2g4qmAQiVBRu2-DNi4i3-E4YiBv0znl5nWX6Lt2G8ulqYELf2Y85A7Lo-OmJ0Wumki1aCKW9AovzbCbP3VzFeIKQzNsVSz4ps-wqExSA')"></div>
</div>
</div>
</div>
<!-- Post Button -->
<div class="pt-md pb-lg">
<button class="w-full h-14 bg-primary text-on-primary rounded-lg font-headline-md text-headline-md hover:shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="button">
<span class="material-symbols-outlined" data-icon="rocket_launch">rocket_launch</span>
                    Post Information
                </button>
<p class="text-center text-xs text-on-surface-variant mt-md">By posting, you agree to our Community Guidelines and Terms of Service.</p>
</div>
</form>
</div>
</div>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden fixed bottom-0 w-full z-50 rounded-t-xl bg-surface-container shadow-lg flex justify-around items-center h-20 px-4 pb-2">
<div class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-label-caps text-label-caps">Home</span>
</div>
<div class="flex flex-col items-center justify-center bg-primary text-on-primary rounded-full px-4 py-1 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="add_circle" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="font-label-caps text-label-caps">Post</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label-caps text-label-caps">Profile</span>
</div>
</nav>
<script>
    // Micro-interactions for chips
    function toggleChip(btn) {
        const isActive = btn.classList.contains('bg-primary');
        if (isActive) {
            btn.classList.remove('bg-primary', 'text-on-primary', 'border-primary');
            btn.classList.add('border-outline-variant', 'text-on-surface-variant');
        } else {
            btn.classList.add('bg-primary', 'text-on-primary', 'border-primary');
            btn.classList.remove('border-outline-variant', 'text-on-surface-variant');
        }
    }

    // Close modal logic
    const closeModal = document.getElementById('closeModal');
    const modalOverlay = document.getElementById('modalOverlay');

    closeModal.addEventListener('click', () => {
        modalOverlay.classList.add('opacity-0');
        modalOverlay.querySelector('div').classList.add('translate-y-10');
        setTimeout(() => {
            alert('Modal closed - returning to Home.');
            modalOverlay.classList.remove('opacity-0');
            modalOverlay.querySelector('div').classList.remove('translate-y-10');
        }, 300);
    });

    // Form submission animation
    const postButton = document.querySelector('button[type="button"].bg-primary');
    postButton.addEventListener('click', () => {
        postButton.innerHTML = `<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span> Posting...`;
        postButton.classList.add('opacity-80');
        
        setTimeout(() => {
            postButton.innerHTML = `<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span> Success!`;
            postButton.classList.replace('bg-primary', 'bg-tertiary-container');
            postButton.classList.replace('text-on-primary', 'text-on-tertiary-container');
            setTimeout(() => {
                modalOverlay.classList.add('opacity-0');
            }, 1000);
        }, 1500);
    });
</script>
</body></html>
