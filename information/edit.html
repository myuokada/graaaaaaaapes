<!DOCTYPE html>

                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],

                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
<style>
        body {
            min-height: max(884px, 100dvh);
            font-family: 'Hanken Grotesk', sans-serif;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen pb-24">
<!-- Top AppBar -->
<header class="bg-surface sticky top-0 z-50 border-b border-outline-variant flex items-center justify-between px-margin-mobile h-16 w-full">
<div class="flex items-center gap-4">
<button aria-label="Go back" class="active:scale-95 transition-transform text-on-surface-variant">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary">Edit Post</h1>
</div>
<div class="flex items-center gap-2">
<button class="material-symbols-outlined text-on-surface-variant hover:opacity-80 transition-opacity">more_vert</button>
</div>
</header>
<main class="max-w-[800px] mx-auto px-margin-mobile py-lg">
<form class="space-y-lg">
<!-- Image Replacement Section -->
<section class="space-y-sm">
<label class="font-body-sm text-body-sm font-bold text-on-surface-variant block uppercase tracking-wider">Post Image</label>
<div class="relative group aspect-video rounded-xl overflow-hidden border border-outline-variant bg-surface-container">
<div class="w-full h-full bg-cover bg-center" data-alt="A high-quality, professional photograph of neatly folded clean laundry stacked in a bright, modern laundry room." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDMwDCjLMSY9DtViZ0oguKvT4Su75ZPt6iYz5bouxj0aM1qLQsLHmlq7dl-RodspsS7BKPzW3CjJWMRVkoTsx8xPg6i-VrWeK0dfXfsSe0T_3fd7TDJZOlDA0beqJNy3InyVP5KeUC6n8yrxBY-KWKsOybwwa0oAardz9okGMExOheLYxcajOCqjF9SybcgubhroPJeoyZzC-pnhQlfMxs2R6h51Tl_6njnCqLxtgw2u7Z3CVU8jWP6lGSdOSpU-KktqY929G1iax4')"></div>
<div class="absolute inset-0 bg-on-surface/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer">
<div class="bg-surface-container-lowest px-4 py-2 rounded-full flex items-center gap-2 shadow-lg scale-95 group-hover:scale-100 transition-transform">
<span class="material-symbols-outlined text-primary">photo_camera</span>
<span class="font-label-caps text-label-caps text-primary">REPLACE IMAGE</span>
</div>
</div>
</div>
</section>
<!-- Form Fields -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<div class="space-y-sm">
<label class="font-body-sm text-body-sm font-bold text-on-surface-variant block uppercase tracking-wider" for="category">Category</label>
<div class="relative">
<select class="w-full h-12 bg-surface-container-lowest border border-outline-variant rounded-lg px-md font-body-lg text-body-lg appearance-none focus:ring-2 focus:ring-primary focus:border-primary outline-none text-on-surface" id="category">
<option selected="">Laundry</option>
<option>Errands</option>
<option>Tutoring</option>
<option>Technical</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
</div>
</div>
<div class="space-y-sm">
<label class="font-body-sm text-body-sm font-bold text-on-surface-variant block uppercase tracking-wider" for="price">Price (PHP)</label>
<input class="w-full h-12 bg-surface-container-lowest border border-outline-variant rounded-lg px-md font-body-lg text-body-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none text-on-surface" id="price" type="number" value="200"/>
</div>
</div>
<div class="space-y-sm">
<label class="font-body-sm text-body-sm font-bold text-on-surface-variant block uppercase tracking-wider" for="title">Title</label>
<input class="w-full h-12 bg-surface-container-lowest border border-outline-variant rounded-lg px-md font-body-lg text-body-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none text-on-surface" id="title" type="text" value="Quick Wash"/>
</div>
<div class="space-y-sm">
<label class="font-body-sm text-body-sm font-bold text-on-surface-variant block uppercase tracking-wider" for="description">Description</label>
<textarea class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg p-md font-body-lg text-body-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none resize-none text-on-surface" id="description" rows="5">Offering quick wash and dry services for busy fellow students. Includes folding. Maximum 7kg per load. High-quality detergents used.</textarea>
</div>
<!-- Bento Info Cards -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-md pt-md">
<div class="bg-primary-container/30 p-md rounded-xl border border-primary-container flex flex-col gap-2">
<span class="material-symbols-outlined text-primary">visibility</span>
<span class="font-label-caps text-label-caps text-on-surface-variant">REACH</span>
<span class="font-headline-md text-headline-md text-primary">142 Views</span>
</div>
<div class="bg-secondary-container/30 p-md rounded-xl border border-secondary-container flex flex-col gap-2">
<span class="material-symbols-outlined text-secondary">star</span>
<span class="font-label-caps text-label-caps text-on-surface-variant">RATING</span>
<span class="font-headline-md text-headline-md text-secondary">4.8 Avg</span>
</div>
<div class="bg-tertiary-container/30 p-md rounded-xl border border-tertiary-container flex flex-col gap-2">
<span class="material-symbols-outlined text-tertiary">calendar_today</span>
<span class="font-label-caps text-label-caps text-on-surface-variant">POSTED</span>
<span class="font-headline-md text-headline-md text-tertiary">2d Ago</span>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-md pt-xl">
<button class="w-full h-[56px] bg-primary text-on-primary font-body-lg text-body-lg font-bold rounded-full shadow-md hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span class="material-symbols-outlined">save</span>
                    Save Changes
                </button>
<button class="w-full py-sm text-error font-body-sm text-body-sm font-bold flex items-center justify-center gap-1 hover:bg-error-container/50 rounded-lg transition-colors active:scale-95" type="button">
<span class="material-symbols-outlined text-[18px]">delete</span>
                    Delete Post
                </button>
</div>
</form>
</main>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-xl bg-surface-container-high shadow-2xl flex justify-around items-center h-20 px-4 pb-2 border-t border-outline-variant">
<a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:bg-surface-container-highest rounded-lg active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined">home</span>
<span class="font-label-caps text-label-caps">Home</span>
</a>
<a class="flex flex-col items-center justify-center bg-primary text-on-primary rounded-full px-5 py-2 active:scale-90 transition-all duration-200 shadow-md" href="#">
<span class="material-symbols-outlined">add_circle</span>
<span class="font-label-caps text-label-caps">Post</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:bg-surface-container-highest rounded-lg active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-label-caps text-label-caps">Profile</span>
</a>
</nav>
<script>
        // Simple micro-interaction for form focus states
        document.querySelectorAll('input, textarea, select').forEach(el => {
            el.addEventListener('focus', () => {
                const label = el.parentElement.querySelector('label') || el.parentElement.parentElement.querySelector('label');
                if (label) label.classList.add('text-primary');
            });
            el.addEventListener('blur', () => {
                const label = el.parentElement.querySelector('label') || el.parentElement.parentElement.querySelector('label');
                if (label) label.classList.remove('text-primary');
            });
        });

        // Basic prevent default for demonstration
        document.querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Saving...';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Changes Saved!';
                btn.classList.replace('bg-primary', 'bg-tertiary');
                setTimeout(() => {
                    btn.innerHTML = originalContent;
                    btn.classList.replace('bg-tertiary', 'bg-primary');
                    btn.disabled = false;
                }, 2000);
            }, 1500);
        });
    </script>
</body></html>
